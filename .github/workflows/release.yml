name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Build release binaries
        run: |
          cargo build --package prism-cli --release --target ${{ matrix.target }}
          cargo build --package clash-prism-ext --release --target ${{ matrix.target }}

      - name: Upload prism-cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/prism-cli${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          retention-days: 1

      - name: Upload clash-prism-ext artifact
        uses: actions/upload-artifact@v4
        with:
          name: clash-prism-ext-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/clash-prism-ext${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          retention-days: 1

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release
          cp artifacts/prism-cli-x86_64-unknown-linux-gnu/prism-cli release/prism-cli-x86_64-linux-gnu 2>/dev/null || true
          cp artifacts/prism-cli-x86_64-apple-darwin/prism-cli release/prism-cli-x86_64-apple-darwin 2>/dev/null || true
          cp artifacts/prism-cli-aarch64-apple-darwin/prism-cli release/prism-cli-aarch64-apple-darwin 2>/dev/null || true
          cp artifacts/prism-cli-x86_64-pc-windows-msvc.exe/prism-cli.exe release/prism-cli-x86_64-pc-windows-msvc.exe 2>/dev/null || true
          cp artifacts/clash-prism-ext-x86_64-unknown-linux-gnu/clash-prism-ext release/clash-prism-ext-x86_64-linux-gnu 2>/dev/null || true
          cp artifacts/clash-prism-ext-x86_64-apple-darwin/clash-prism-ext release/clash-prism-ext-x86_64-apple-darwin 2>/dev/null || true
          cp artifacts/clash-prism-ext-aarch64-apple-darwin/clash-prism-ext release/clash-prism-ext-aarch64-apple-darwin 2>/dev/null || true
          cp artifacts/clash-prism-ext-x86_64-pc-windows-msvc.exe/clash-prism-ext.exe release/clash-prism-ext-x86_64-pc-windows-msvc.exe 2>/dev/null || true
          echo "=== Release files ==="
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/prism-cli-x86_64-linux-gnu
            release/prism-cli-x86_64-apple-darwin
            release/prism-cli-aarch64-apple-darwin
            release/prism-cli-x86_64-pc-windows-msvc.exe
            release/clash-prism-ext-x86_64-linux-gnu
            release/clash-prism-ext-x86_64-apple-darwin
            release/clash-prism-ext-aarch64-apple-darwin
            release/clash-prism-ext-x86_64-pc-windows-msvc.exe
            release/checksums-sha256.txt