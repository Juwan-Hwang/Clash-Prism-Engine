name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build & Release ────────────────────────────────────
  release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: prism-cli
            asset_name: prism-cli-x86_64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: prism-cli
            asset_name: prism-cli-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: prism-cli
            asset_name: prism-cli-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: prism-cli.exe
            asset_name: prism-cli-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --package prism-cli --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 1

  # ─── Create GitHub Release ──────────────────────────────
  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release
          cp artifacts/prism-cli-x86_64-linux-gnu/prism-cli release/prism-cli-x86_64-linux-gnu 2>/dev/null || true
          cp artifacts/prism-cli-x86_64-apple-darwin/prism-cli release/prism-cli-x86_64-apple-darwin 2>/dev/null || true
          cp artifacts/prism-cli-aarch64-apple-darwin/prism-cli release/prism-cli-aarch64-apple-darwin 2>/dev/null || true
          cp artifacts/prism-cli-x86_64-pc-windows-msvc.exe/prism-cli.exe release/prism-cli-x86_64-pc-windows-msvc.exe 2>/dev/null || true
          echo "=== Release files ==="
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/prism-cli-x86_64-linux-gnu
            release/prism-cli-x86_64-apple-darwin
            release/prism-cli-aarch64-apple-darwin
            release/prism-cli-x86_64-pc-windows-msvc.exe
            release/checksums-sha256.txt
